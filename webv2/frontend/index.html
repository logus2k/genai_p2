<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Model Prediction Explorer</title>
	<link rel="stylesheet" href="/scipredictor/static/styles.css" />
    <script type="importmap">
    {
        "imports": {
            "three": "/scipredictor/static/three.module.min.js",
            "three/addons/": "/scipredictor/static/"
        }
    }
    </script>
    <script type="module" src="/scipredictor/static/render3d.js"></script>
    <script src="/scipredictor/static/socket.io.min.js"></script>
	<script src="/scipredictor/static/app.js"></script>
</head>
<body>
<div class="page-wrapper">

	<div class="content-wrapper">

		<div class="left-pane">

			<div id="leftFixedTop">

				<div class="top-bar">
					<div class="top-bar-left">
						<h1>SciPredictor</h1>
						<div class="controls">
							<label>Sample #</label>
							<input type="number" id="sampleIndex" min="0" value="0">
							<button id="btnSearch">Search</button>
							<button id="btnRandom">Random</button>
						</div>
					</div>
				</div>

				<div class="top-bar-right"></div>

				<div class="container">

					<div id="loading" class="loading">Loading...</div>
					<div id="error" class="error"></div>

					<div id="sampleInfo" class="sample-info" style="display:none;">
						<div id="datasetInfo" style="color:#000000; font-size:12px;"></div>
						<p style="display: none;"><strong>Index:</strong> <span id="sampleIndexDisplay"></span></p>
						<p><strong>Actual Label:</strong> <span id="actualLabel"></span></p>
						<p><strong>Text Preview:</strong></p>
						<div id="textPreview"
							style="white-space:pre-wrap; max-height:200px; overflow-y:auto;
							       background:white; padding:10px; border:1px solid #ddd;">
						</div>
					</div>

					<div id="predictions" style="display: block;">
						<h4>Top 5 Predictions</h4>
						<div id="predictionList"></div>
					</div>

				</div>
			</div>

			<div id="embeddingVisContainer"></div>

		</div>

		<div class="right-pane">
			<iframe id="pdfViewer"></iframe>
		</div>

	</div>

</div>
</body>
</html>
